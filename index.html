<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Store</title>
    <link rel="icon" type="image/x-icon" href="assets/image/Logo.svg" />
    <link rel="stylesheet" href="assets/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer
      "
    />
  </head>
  <body>
    <div class="header">
      <h1>Book Store</h1>
    </div>
    <div class="book">
      <div class="book-card">
        <img src="assets/image/book 1.jpeg" alt="book1" />
        <p>A diary of a wimpy kid</p>
      </div>
      <div class="book-card">
        <img src="assets/image/book 2.jpeg" alt="book2" />
        <p>Escape from Stalingrad</p>
      </div>
      <div class="book-card">
        <img src="assets/image/book 3.jpeg" alt="book3" />
        <p>Iceberg</p>
      </div>
      <div class="book-card">
        <img src="assets/image/book 4.jpeg" alt="book4" />
        <p>Refugee</p>
      </div>
      <div class="book-card">
        <img src="assets/image/book 5.jpeg" alt="book5" />
        <p>Solo Leveling</p>
      </div>
      <div class="book-card">
        <img src="assets/image/Book 6.jpeg" alt="book6" />
        <p>The Famous Five</p>
      </div>
      <div class="book-card">
        <img src="assets/image/book 7.jpeg" alt="book7" />
        <p>King of Heaven</p>
      </div>
      <div class="book-card">
        <img src="assets/image/book 8.jpeg" alt="book8" />
        <p>A walk in the woods</p>
      </div>
    </div>
    <script src="assets/main.js"></script>
  </body>
</html>
